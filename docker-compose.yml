services:
  postgres:
    image: postgres:16-alpine
    container_name: prismatch_db
    environment:
      POSTGRES_USER: prismatch
      POSTGRES_PASSWORD: prismatch123
      POSTGRES_DB: prismatch_kalkulator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data:
